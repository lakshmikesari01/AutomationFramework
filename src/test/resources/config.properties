# ── Application ─────────────────────────────────────────────────────────────
base.url=https://automationexercise.com

# ── Browser ──────────────────────────────────────────────────────────────────
# Options: chrome | firefox | edge
browser=chrome
headless=false

# ── Timeouts (seconds) ───────────────────────────────────────────────────────
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# ── Reports ──────────────────────────────────────────────────────────────────
reports.dir=reports
screenshots.dir=reports/screenshots
